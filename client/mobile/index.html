<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <title>Real-Time Subtitle</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app">
    <header class="header">
      <h1>Subtitle Glasses</h1>
      <div class="status" id="status">Disconnected</div>
    </header>

    <main class="main">
      <div class="transcript-panel">
        <h2>Transcribed</h2>
        <div class="text-display" id="transcript">Speak to see transcription...</div>
      </div>

      <div class="transcript-panel">
        <h2>Translated</h2>
        <div class="text-display" id="translated">Translation will appear here...</div>
      </div>

      <div class="controls">
        <button class="btn btn-primary" id="recordBtn" disabled>
          <span class="btn-icon">🎤</span>
          <span class="btn-label">Start Listening</span>
        </button>
        <div class="lang-row">
          <label>Speaking:</label>
          <select id="sourceLang" class="lang-select">
            <option value="en">English</option>
            <option value="es">Spanish</option>
            <option value="fr">French</option>
            <option value="de">German</option>
            <option value="zh">Chinese</option>
            <option value="ja">Japanese</option>
            <option value="ko">Korean</option>
            <option value="ar">Arabic</option>
            <option value="hi">Hindi</option>
          </select>
        </div>
        <div class="lang-row">
          <label>Translate to:</label>
          <select id="targetLang" class="lang-select">
            <option value="es">Spanish</option>
            <option value="en">English</option>
            <option value="fr">French</option>
            <option value="de">German</option>
            <option value="zh">Chinese</option>
            <option value="ja">Japanese</option>
            <option value="ko">Korean</option>
            <option value="ar">Arabic</option>
            <option value="hi">Hindi</option>
          </select>
        </div>
      </div>
    </main>

    <footer class="footer">
      <small>Phase 1: Speech → Text → Translation</small>
    </footer>
  </div>

  <script src="app.js"></script>
</body>
</html>
